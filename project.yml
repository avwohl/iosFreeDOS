name: DOSEmu
options:
  bundleIdPrefix: com.awohl
  deploymentTarget:
    iOS: "15.0"
  xcodeVersion: "15.0"
settings:
  base:
    CLANG_CXX_LANGUAGE_STANDARD: c++17
    SUPPORTS_MACCATALYST: YES
targets:
  DOSEmu:
    type: application
    platform: iOS
    sources:
      - path: DOSEmu
      - path: src
        excludes:
          - main_cli.cc
          - test_emu88.cc
          - debug_boot.cc
    configFiles:
      Debug: Config.xcconfig
      Release: Config.xcconfig
    settings:
      base:
        SWIFT_OBJC_BRIDGING_HEADER: DOSEmu/DOSEmu-Bridging-Header.h
        HEADER_SEARCH_PATHS:
          - $(SRCROOT)/src
          - $(SRCROOT)/DOSEmu/Bridge
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations: UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight UIInterfaceOrientationPortraitUpsideDown
        INFOPLIST_KEY_UIRequiresFullScreen: NO
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: 5
        PRODUCT_BUNDLE_IDENTIFIER: com.awohl.FreeDOS
        INFOPLIST_KEY_CFBundleDisplayName: FreeDOS
        INFOPLIST_KEY_ITSAppUsesNonExemptEncryption: NO
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        GENERATE_INFOPLIST_FILE: YES
