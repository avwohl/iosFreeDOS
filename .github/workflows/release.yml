name: Build Release Assets

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g., v1.0.0)'
        required: true
        type: string
      create_release:
        description: 'Create GitHub release'
        required: false
        type: boolean
        default: true

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install NASM
        run: brew install nasm

      - name: Install mtools and dosfstools
        run: brew install mtools dosfstools

      - name: Build DOS utilities
        run: |
          nasm -f bin -o dos/r.com dos/r.asm
          nasm -f bin -o dos/w.com dos/w.asm
          nasm -f bin -o dos/dpmitest.com dos/dpmitest.asm

      - name: Download FreeDOS 1.4 ISOs
        run: |
          mkdir -p fd
          echo "Downloading FreeDOS 1.4 LiveCD..."
          curl -L --retry 3 --connect-timeout 30 --retry-delay 10 -o fd/FD14LIVE.iso \
            https://www.ibiblio.org/pub/micro/pc-stuff/freedos/files/distributions/1.4/official/FD14LIVE.iso
          echo "Downloading FreeDOS 1.4 Bonus CD..."
          curl -L --retry 3 --connect-timeout 30 --retry-delay 10 -o fd/FD14BNS.iso \
            https://www.ibiblio.org/pub/micro/pc-stuff/freedos/files/distributions/1.4/official/FD14BNS.iso
          ls -lh fd/*.iso

      - name: Build hard disk image
        run: scripts/build_hdd.sh

      - name: Build games disk image
        run: scripts/build_games_disk.sh

      - name: Collect release assets
        run: |
          mkdir -p dist
          # Help system
          cp release_assets/help_index.json dist/
          cp release_assets/help_*.md dist/
          # Disk catalog
          cp release_assets/disks.xml dist/
          # DOS utilities
          cp dos/r.com dist/
          cp dos/w.com dist/
          # Boot disk (if exists)
          if [ -f fd/freedos.img ]; then
            cp fd/freedos.img dist/
          fi
          # Hard disk image (if built)
          if [ -f fd/freedos_hd.img ]; then
            cp fd/freedos_hd.img dist/
          fi
          # Games disk image (if built)
          if [ -f fd/freedos_games.img ]; then
            cp fd/freedos_games.img dist/
          fi
          # Shareware games bundle (for reproducible builds)
          if [ -d fd/games ]; then
            tar czf dist/shareware-games.tar.gz -C fd games GAMES.TXT
          fi
          # Generate checksums
          cd dist && shasum -a 256 * > SHA256SUMS

      - name: List assets
        run: ls -la dist/

      - name: Create Release
        if: ${{ inputs.create_release }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ inputs.tag }}" \
            --title "FreeDOS Emulator ${{ inputs.tag }}" \
            --generate-notes \
            dist/*
